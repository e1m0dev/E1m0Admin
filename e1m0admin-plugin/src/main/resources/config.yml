# База Данных | Важная вещь, без нее плагин работать - не будет.
# Данные - берутся именно с Вашего сервера с Вашей СУБД.
Database:
  type: "PostgreSQL"        # PostgreSQL, MySQL, MariaDB
  user: "postgre"           # Пример: E1m0
  pass: "postgre"           # Пример: Elm0Dev
  name: "E1m0Admin"         # Пример: Server_Prod
  host: "127.0.0.1"         # Пример: 217.171.146.202
  port: 5433                # Пример: 3306, 5432, 5433

# Параметры плагина | Параметры самого плагина на которые он будет опираться в работе своих функций.
Settings:
  consoleLogActive: true      # Сообщения | Будут ли логироватся действия администратора?
  prefixEnable: true          # Сообщения | Будет ли показыватся префикс? Пример: E1m0-Admin - Внимание | У Вас - нет на это права!
  prefix: "&cE1m0-Admin |"    # Сообщения | Префикс при системных сообщениях. Пример: ADM | У вас нет на это прав!
  world: "world"              # Мир       | В папке с Вашим сервером, у Вас есть в server.properties название Вашего мира.

  Dev:
    salaryCheck: 60 # | ❗ Через сколько МИНУТ будет проходить проверка scheduler на зарплаты админов? Советую не трогать если не знаем что такое. Действия с базой там плотные.
    # Стандарт: 60 или же 1 час.

    rewatchTick: 1 # Слежка |❗ Опасная настройка, только для знающих людей с уровнем допуска DEV Рекомендуемое значение: 10+.
    # ❓- Сколько тиков будет длиться один кадр слежки? Меньше тиков = больше плавности == БОЛЬШЕ нагрузка на сервер! Если у Вас тпс ниже 20 - Не советую.
    rewatchVectorX: 1 # Слежка | На сколько "отдаленно" будет камера у администратора?
    rewatchVectorY: 1 # Слежка | На сколько высоко будет камера у администратора?
    rewatchVectorZ: 1 # Слежка | На сколько "глубоко" будет камера у администратора?

    # ПРЕСЕТЫ REWATCH | Если Вам хочется взять готовый пресет настроек и не игратся с ними, прошу:
    # | Поближе
    #    rewatchVectorX: 1 # Слежка | На сколько "отдаленно" будет камера у администратора?
    #    rewatchVectorY: 1 # Слежка | На сколько высоко будет камера у администратора?
    #    rewatchVectorZ: 1 # Слежка | На сколько "глубоко" будет камера у администратора?

    # | Средне
    #    rewatchVectorX: 2 # Слежка | На сколько "отдаленно" будет камера у администратора?
    #    rewatchVectorY: 2 # Слежка | На сколько высоко будет камера у администратора?
    #    rewatchVectorZ: 2 # Слежка | На сколько "глубоко" будет камера у администратора?

    # | Подальше
    #    rewatchVectorX: 3 # Слежка | На сколько "отдаленно" будет камера у администратора?
    #    rewatchVectorY: 3 # Слежка | На сколько высоко будет камера у администратора?
    #    rewatchVectorZ: 3 # Слежка | На сколько "глубоко" будет камера у администратора?

# Параметры | Связанные с разрешениями для главных администраторов серверов+,
#  которые в праве сами выбирать способности своей администрации.
Server:
  # - | ADMIN
  invisibility: true # Невидимость | Включать ли возможность e1m0-невидимки?
  rewatch: true      # Слежка за юзером | Включать ли возможность e1m0-rewatcher?
  report: true       # Репорты | Включить ли возможность отправлять и управлять репортами?
  aban: true         # Админ-Блок | Включить ли возможность блокировать администраторам доступ при сливе?

  # - | PLAYER
  admins: true       # Администрация | Включать ли возможность про
  reportPlayer: true # Слежка за юзером | Включать ли возможность e1m0-rewatcher?

  # - | STAFF
  abonusall: true # Бонусы | Включить ли возможность выдавать бонусы всем?
  abonus: true    # Бонусы | Включить ли возможность выдавать бонус админу?

  adminPay: true   # Зарплата | Каждый отыгранный администратором час = определенные действия в отношении администратора.
  adminBonus: true # Зарплата | Каждый дополнительный наигранный час = дополнительные действия.

  emergencyRep: true # Репорт | Будет ли оповещение в чате администрации при: Срочном репорте?
  donateReport: true # Репорт | Будет ли оповещение в чате администрации при: Донат репорте?
  newReport: true    # Репорт | Будет ли оповещение в чате администрации при: Новом репорте?

  # PermissionManager:
  # При каких разрешениях у администраторов будут работать команды?
  # Вы - можете полностью настроить какие команды включены на сервере, какие выключены, у кого есть к ним доступ у кого нет. Полная адаптивность к Вашему серверу.
Permissions:
  # 🎫 | Главные разрешения | Печать администратора.
  admin: "e1admin.admin"                   # Печать | Является-ли данный пользователь администратором сервера?
  staff: "e1admin.staff"                   # Печать | Является-ли данный администратор, главой сервера?

  # 🕹️ | Например для обычных игроков:
  admins: "e1admin.admins"                 # Админ-Лист  | Какое разрешение на чек администрации?

  # 🎫 | Например разрешение обычных администраторов:
  invisibility: "e1admin.invise"           # Невидимость | Какое разрешение на просмотр и использование способности?
  rewatch: "e1admin.rewatch"               # Слежка | Какое разрешение на просмотр и использование способности?
  arep: "e1admin.arep"                     # Репорт | Какое разрешение на просмотр и использование способности?
  aban: "e1admin.aban"                     # Репорт | Какое разрешение на блок админ-доступа?

  # 🔐 | Например кураторы:
  adminbonus: "e1admin.adminbonus"         # Администрация | Какое разрешение у администратора для выдачи бонуса другому администраторУ?
  adminbonusall: "e1admin.adminbonusall"   # Администрация | Какое разрешение у администратора для выдачи бонуса другим администраторАМ?

  # ❗ | STAFF:
  secretcode: "e1admin.asecret"            # Админ | Какое разрешение у высших адм на установление секретного пароля?
  downadm: "e1admin.downadmin"             # Админ | Какое разрешение у высших адм на понижение других администраторов?
  deladm: "e1admin.deladmin"               # Админ | Какое разрешение у высших адм на удаление других администраторов?
  setadm: "e1admin.setadmin"               # Админ | Какое разрешение у высших адм на постановление других администраторов?
  upadm: "e1admin.upadmin"                 # Админ | Какое разрешение у высших адм на повышение других администраторов?

# Параметры | Связанные с игрой администраторации, их зарплаты, АЗ, их бонусы за безумные трюки,
#  которые Вы можете полностью настраивать как душе угодно, развлекайтесь.
Admin:
  # Амин-Зона | Сюда, администраторы попадают при регистрации например, или при окончании реватча (/reoff)
  # Амин-Зона | ❗ Лучше сразу заполнить.
  AdminZone:
    world: "world"
    x: 0
    y: 80
    z: 0

  Salary:
    # Или же - AdminPay, зарплата для администраторов которая выдается за определенные действия в игре.
    # Можно так же настроить действия для большего кол-ва часов выставляя hour.
    SalaryActions:
      1:
        minutes: 60
        Actions:
          - "msg %player Привет. Ты отыграл час! Твоя зарплата: %salary!"
      2:
        minutes: 120
        Actions:
          - "msg %player Привет! Ты отыграл целых два часа. Вот твоя награда! Спасибо что трудишься сверх своей нормы!"
          - "eco give %player 100"

  # Параметры бонусов | Старшая администрация может выдать бонус в N кол-ве, Вам решать что это будет, например у кого-либо есть админ коины, вставляете команду сюда и Воуаля.
  # Крутить %admin %bonus можно в любом порядке, это переменные абстракции которые перенимают форму заданную плагином.
  Bonus:
    giveBonus: "eco give %admin %bonus" # ❗НУЖЕН VAULT, лучше заменить на что то другое, это - Ваша фантазия уже.

  # | Staff
  # Вот тут - очень интересно. Полностью настраиваемая система рангов, вы можете создавать сколько угодно уровней
  #  админ-допуска, называть их по-разному, не советую конечно менять названия в runtime потому что может быть путаница,
  #  но тут - и лежат Ваши администраторы и их разрешения.
  AdminRanks:
    # Минимальный ранг на который будет поставлен администратор при setAdmin.
    mladm:
      prefix: "Младший администратор"   # Важно   | Какой префикс в DB будет выдаваться при постановлении на адм?
      weight: 1                         # Важно | Какой вес будет у данной роли? Например: Некоторые администраторы - не могут забанить некоторых игроков.
      salary: 333                       # Важно | Какая зарплата будет у администратора в Вашей валюте?
      scom: "eco give %player %salary"  # Важно | Какая команда будет выдавать валюту которая закреплена за администратором? Или например предмет из ресурс-пака?

    # Около средние ранги на который будет поставлен администратор при повышении.
    adm:
      prefix: "Администратор"
      salary: 777
      weight: 2
      scom: "eco give %player %salary"

    # Здесь например ваши максимальные ранги среди всех.
    stadm:
      prefix: "Ст. Администратор"
      weight: 3
      salary: 888
      scom: "eco give %player %salary"

  # PIN-Code | Или же SecretCode, параметры при котором используются действия с PIN кодом администратора.
  # Каждому администратору Выдается старшим администратором свой PIN-Code и позже вводится на постоянной основе.
  SecretCode:
    wrongCodeTrigger: true  # ❗| Будет ли извещение, что администратор не правильно ввел пароль?
    accessCodeTrigger: true # ❗| Будет ли извещение, что администратор правильно ввел пароль?

    adminAccessNotify: "&aПоприветствуйте! Администратор %admin зарегистрировался в системе!" # | Успешная регистрация в системе.
    wrongCodeNotify: "&4&bОй! Администратор %admin ввел не правильный секретный код!"         # | Не успешная регистрация в системе.


    # Trigger Action | Действия при одном из состояний входа, то есть, если админ не правильно ввел пин код, я могу забанить его аккаунт,
    # Отобрать права, или просто кикнуть. А если ввел правильно, могу написать в админ чат или весь чат, что все хорошо.
    Actions:
      accessCodeActions:
        - "say §aАдминистратор %admin успешно авторизовался!"
      wrongCodeActions:
        - "kick %admin Не верно ввел админ код!"

  # Админ-Лист | Как будет выглядеть для игрока сообщение об админ-листе?
  AdminList:
    - ""
    - "&6Администраторы &7на &aрабочем посту:"
    - "- | &6%adminInJob"
    - ""
    - ""
    - "&6Администраторы &7в &aигре:"
    - "- | &a%adminInGame"
    - ""
      # Если просто хотите вывести всех администраторов, я это понимаю:
      #    - "%adminInGame"
      #    - "%adminInJob"

    # Здесь - я думаю все должно быть понятно, Вы сами прописываете свои сценарии и формы заданные на своих серверах,
    # Я понимаю - что у всех все разное, по этому, адаптируюсь под Вас 💚
  AHelp:
    admin: # Если у администратора есть печать старшего (Permissions.admin)
      - ""
      - "&aКоманды для администрации: "
      - "&a/acc &7— Зарегистрироваться в системе."
      - ""
      - ""
      - "&a/re [Игрок] &7— Слежка за целью от лица."
      - "&a/arep [Ответ] &7— Открыть меню репортов с Вашей формой."
      - "&a/ainv &7— Уйти в продвинутую невидимку."
      - "&a/aban [Админ] &7— При сливе отобрать доступ у администратора!"
      - ""
      - ""
      - ""
      - "&6Сценарии их применения: "
      - "&fСитуация: Чтобы получить доступ к командам нужно получить разрешение: &6— /acc"
      - "&fСитуация: Нужно проследить за целью оставаясь не замеченным: &6— /re E1m0 (Пример)"
      - "&fСитуация: Нужно проследить за ситуацией от своего лица: &6— /ainv + /tp [Игрок]"
      - "&fСитуация: Нужно посмотреть ситуацию на сервере и помочь: &6— /arep Администратор E1m0 — уже работает по Вашей жалобе!"
      - "&fСитуация: Человек сливает сервер, банит всех под ряд: &6— /aban E1m0"
      - ""
    staff: # Если у администратора есть печать старшего (Permissions.staff)
      - ""
      - "&aКоманды для STAFF: "
      - "&a/aup &7— Повысить администратора."
      - "&a/adel &7— Уволить администратора."
      - "&a/adown &7— Понизить администратора."
      - "&a/aset &7— Поставить администратора."
      - "&a/abonus &7— Выдать бонус администратору."
      - "&a/aunban &7— Выдать администратору доступ если он в бане."
      - "&a/abonusall &7— Выдать бонус администраторам."
      - "&a/asetsecret &7— Выдать секретный код."
      - ""

  AutoSetAdmin:

    # - |
    autoSetPermissions:
      enable: true          # |
      permissionInWeight: # |
        1:
          permissions:
            - "lp user %admin permission set e1admin.admin"
            - "lp user %admin permission set e1admin.invise"
            - "lp user %admin permission set e1admin.rewatch"
            - "lp user %admin permission set e1admin.arep"
            - "lp user %admin permission set e1admin.aban"
        2:
          permissions:
            - "lp user %admin permission set e1admin.adminbonus"
            - "lp user %admin permission set e1admin.adminbonusall"
        3:
          permissions:
            - "lp user %admin permission set e1admin.staff"
            - "lp user %admin permission set e1admin.asecret"
            - "lp user %admin permission set e1admin.downadmin"
            - "lp user %admin permission set e1admin.deladmin"
            - "lp user %admin permission set e1admin.setadmin"
            - "lp user %admin permission set e1admin.upadmin"

    autoSetSkins:
      enable: true
      skinsInWeight:
        1:
          skin:
            - "skin set ADMIN %admin"
        2:
          skin:
            - "skin set STAFF %admin"
        3:
          skin:
            - "skin set CONSOLE %admin"


  AutoDelAdmin:

    # - |
    autoDelPermissions:
      enable: true          # |
      permissionInWeight: # |
        1:
          permissions:
            - "lp user %admin permission unset e1admin.admin"
            - "lp user %admin permission unset e1admin.invise"
            - "lp user %admin permission unset e1admin.rewatch"
            - "lp user %admin permission unset e1admin.arep"
            - "lp user %admin permission unset e1admin.aban"
        2:
          permissions:
            - "lp user %admin permission unset e1admin.adminbonus"
            - "lp user %admin permission unset e1admin.adminbonusall"
        3:
          permissions:
            - "lp user %admin permission unset e1admin.staff"
            - "lp user %admin permission unset e1admin.asecret"
            - "lp user %admin permission unset e1admin.downadmin"
            - "lp user %admin permission unset e1admin.deladmin"
            - "lp user %admin permission unset e1admin.setadmin"
            - "lp user %admin permission unset e1admin.upadmin"

    autoDelSkins:
      enable: true
      skinsInWeight:
        1:
          skin:
            - "skin clear %admin"
        2:
          skin:
            - "skin clear %admin"
        3:
          skin:
            - "skin clear %admin"

  Leak:
    enable: true
    LeakSound: "ENTITY_ENDER_DRAGON_DEATH" # | Ирония с падшим ангелом у которого отобрали все что он имел.
    LeakActions:
      - "kick %leak Подозрения в сливе админ-прав."

  # Репортики | Связанные с игрой администрации и игроков, контрольные слова, статусы, бонусы и прочее.
  #  Здесь можно настроить GUI, авто-ответы на репорты, бонусы за репорты и т.д:
  Report:
    minReportLength: 3 # Репорт | Минимальное кол-во символов в репорте для администрации?
    reportMaxSize: 44 # Репорт | Сколько будет максимальное кол-во репортов до переполнения?

    # Репортики | Статусы, которые приобретают свою роль в базе и GUI.
    status_send: "&aОтправлен!"
    status_inJob: "&6В работе.."
    status_answered: "&cОтвечен."

    # Репортики | Слова, которые в репорте вызывают триггер emergencyRep, на который можно быстро отреагировать просто нажав на сообщение
    EmergencyReportSword:
      - "убивают"
      - "гриферят"
      - "читерят"

    # | https://minecraftsounds.com/
    # Репортики | Новый репорт, действия + звук для всей администрации?
    NewReport:
      sound: "entity.player.attack.knockback"
      reportMessage:
        - ""
        - "&7Внимание, поступил новый &cрепорт&7: &b%content&7. Отправитель: %player"
        - ""

    # | https://minecraftsounds.com/
        # Репортики | Срочный репорт, действия + звук для всей администрации?
    EmergencyReport:
      sound: "entity.player.levelup"
      emergencyMessage:
        - ""
        - "&4Внимание 🚨 &7| Обнаружен срочный репорт: &7%content"
        - ""

    # | https://minecraftsounds.com/
    # Репортики | Донат репорт, действия + звук для всей администрации?
    DonateReport:
      sound: "entity.ender_dragon.hurt"
      permission: "e1admin_bypass"
      donateMessage:
        - ""
        - "<gradient:#FD1AB6:#6554B6>Внимание❗ Репорт от VIP клиента! %content. Отправитель: %player</gradient>"
        - ""

    # Репортики | Функция при которой при нажатии на срочный репорт не нужно вводить форму для определенного администратора.
    # При /arep - Нужно указывать форму сервера на некоторых проектах. Пример: /arep Слежу за Вами.. // By E1m0
    # Здесь же - Форма автоматическая.
    AutoReport:
      enable: true
      auto_Answer: "&cРепорт | Спешим к Вам на помощь!"

    # Репортики | Если навести на emergency report что будет показано?
    HoverReport:
      - "&aНажмите чтобы взять ❤️"
      - "&cРепорт&7: %content"
      - "&aСтатус&7: %status"
      - "&4Принял&7: %admin"
      - ""
      - "&aОтправил&7: %player"
      - "&7Дата: %date"

  # | https://minecraft-inside.ru/blocks/
  # Интерфейс | Ну тут думаю понятно, адаптивное меню если что-то не нравится.
  GUI:
    ReportGUI:
      NAME: "&cМеню репортов"
      SIZE: 54

      items:
        close:
          slot: 49
          name: "&cЗакрыть."
          item: "BARRIER"
          lore:
            - "Нажмите чтобы закрыть."

    # Репортики | Какой item в меню у ReportGUI? Он отдельно, потому что это не статический обьект + не постоянная форма, если объяснять разработчику: Я не могу отдавать в статику не стабильный Mutable state.
    ReportItem:
      NAME: "%content"
      ITEM: PLAYER_HEAD
      LORE: # Форма как будет выглядеть репорт при наведении | Или же - его лор.
        - "&7Репорт: %content"
