  # - | Новая функция 3.0: Триггер на слив, здесь Вы можете настроить параметры связанные по подозрению в сливе.
  Leak:
    enable: true # | Будет ли работать функция авто-удаления?
    LeakSound: "ENTITY_ENDER_DRAGON_DEATH" # | Звук, который будет воспроизводиться всей администрации при снятии админ прав. Ирония с падшим ангелом у которого отобрали все что он имел.
    LeakActions: # | Действия которые будут направлятся против сливщика.
      #      - "ban %leak 777y Подозрения в сливе админ-прав."
      - "kick %leak Подозрения в сливе админ-прав."

  # Репортики | Связанные с игрой администрации и игроков, контрольные слова, статусы, бонусы и прочее.
  #  Здесь можно настроить GUI, авто-ответы на репорты, бонусы за репорты и т.д:
  Report:
    minReportLength: 3 # Репорт | Минимальное кол-во символов в репорте для администрации?
    reportMaxSize: 44 # Репорт | Сколько будет максимальное кол-во репортов до переполнения?

    # Репортики | Статусы, которые приобретают свою роль в базе и GUI.
    status_send: "&aОтправлен!"
    status_inJob: "&6В работе.."
    status_answered: "&cОтвечен."

    # Репортики | Слова, которые в репорте вызывают триггер emergencyRep, на который можно быстро отреагировать просто нажав на сообщение
    EmergencyReportSword:
      - "убивают"
      - "гриферят"
      - "читерят"

    # | https://minecraftsounds.com/
    # Репортики | Новый репорт, действия + звук для всей администрации?
    NewReport:
      sound: "entity.player.attack.knockback"
      reportMessage:
        - ""
        - "&7Внимание, поступил новый &cрепорт&7: &b%content&7. Отправитель: %player"
        - ""

    # | https://minecraftsounds.com/
        # Репортики | Срочный репорт, действия + звук для всей администрации?
    EmergencyReport:
      sound: "entity.player.levelup"
      emergencyMessage:
        - ""
        - "&4Внимание 🚨 &7| Обнаружен срочный репорт: &7%content"
        - ""

    # | https://minecraftsounds.com/
    # Репортики | Донат репорт, действия + звук для всей администрации?
    DonateReport:
      sound: "entity.ender_dragon.hurt"
      permission: "e1admin_bypass"
      donateMessage:
        - ""
        - "<gradient:#FD1AB6:#6554B6>Внимание❗ Репорт от VIP клиента! %content. Отправитель: %player</gradient>"
        - ""

    # Репортики | Функция при которой при нажатии на срочный репорт не нужно вводить форму для определенного администратора.
    # При /arep - Нужно указывать форму сервера на некоторых проектах. Пример: /arep Слежу за Вами.. // By E1m0
    # Здесь же - Форма автоматическая.
    AutoReport:
      enable: true
      auto_Answer: "&cРепорт | Спешим к Вам на помощь!"

    # Репортики | Если навести на emergency report что будет показано?
    HoverReport:
      - "&aНажмите чтобы взять ❤️"
      - "&cРепорт&7: %content"
      - "&aСтатус&7: %status"
      - "&4Принял&7: %admin"
      - ""
      - "&aОтправил&7: %player"
      - "&7Дата: %date"

